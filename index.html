<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJC Event Pro</title>

<link rel="icon" href="logo.png">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: black;
  color: white;
}

nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 20px 40px;
  background: black;
  position: fixed;
  width: 100%;
  top: 0;
}

nav img {
  height: 50px;
}

nav ul {
  display: flex;
  gap: 30px;
  list-style: none;
}

nav a {
  color: white;
  text-decoration: none;
  font-size: 14px;
}

.btn {
  border: 1px solid gold;
  padding: 10px 20px;
  color: gold;
}

.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}

.hero img {
  max-width: 400px;
}

.section {
  padding: 80px 40px;
  text-align: center;
}

h2 {
  color: gold;
}

.services {
  display: flex;
  justify-content: center;
  gap: 40px;
  flex-wrap: wrap;
}

.card {
  border: 1px solid #333;
  padding: 20px;
  width: 250px;
}

form {
  max-width: 400px;
  margin: auto;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

input, textarea {
  padding: 10px;
  border: none;
}

button {
  padding: 12px;
  background: gold;
  border: none;
  cursor: pointer;
}
</style>

</head>

<body>

<!-- NAV -->
<nav>
  <img src="logo.png" alt="DJC Logo">
  <ul>
    <li><a href="#about">About</a></li>
    <li><a href="#services">Services</a></li>
    <li><a href="#contact">Contact</a></li>
  </ul>
  <a href="#contact" class="btn">BOOK NOW</a>
</nav>

<!-- HERO -->
<section class="hero">
  <div>
    <img src="logo.png" alt="DJC Event Pro">
    <h1>Weddings | Private Events | Corporate Events</h1>
  </div>
</section>

<!-- ABOUT -->
<section id="about" class="section">
  <h2>About</h2>
  <p>Professional DJ services delivering unforgettable experiences for weddings, private parties, and corporate events.</p>
</section>

<!-- SERVICES -->
<section id="services" class="section">
  <h2>Services</h2>
  <div class="services">
    <div class="card">Weddings</div>
    <div class="card">Private Events</div>
    <div class="card">Corporate Events</div>
  </div>
</section>

<!-- CONTACT -->
<section id="contact" class="section">
  <h2>Book Your Event</h2>

  <form>
    <input type="text" placeholder="Name" required>
    <input type="email" placeholder="Email" required>
    <input type="text" placeholder="Event Type">
    <textarea placeholder="Event Details"></textarea>
    <button type="submit">Submit</button>
  </form>

</section>

</body>
</html>
